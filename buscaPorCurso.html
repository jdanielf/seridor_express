<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Curso</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            color: #333;
        }

        form {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 50%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <h1>Buscar Curso</h1>
    <form action="/curso" method="GET">
        <label  for="curso">Nome do Curso:</label>
        <input type="text" id="curso" name="curso">
        <button type="submit">Buscar</button>
    </form>


<script>
    const form = document.querySelector('form')
    form.addEventListener('submit', async (e) => {
        e.preventDefault() //impede o comportamento padrão do formulário de recarregar a página
        const curso = document.getElementById('curso').value //obtém o valor do campo de texto com id 'curso'
        try {
            const response = await fetch(`/curso?curso=${curso}`) //faz uma requisição GET para a rota /curso passando o nome do curso como parâmetro na URL
            if (!response.ok) throw new Error('Curso não encontrado') //se a resposta não for ok, lança um erro com a mensagem 'Curso não encontrado'
            const cursoEncontrado = await response.json() //converte a resposta para JSON
            alert(`Curso: ${cursoEncontrado.curso}\nCarga Horária: ${cursoEncontrado.ch}\nTipo: ${cursoEncontrado.tipo}`) //exibe um alerta com as informações do curso encontrado
        } catch (error) {
            alert(error.message) //exibe um alerta com a mensagem de erro
        }
    })
</script>

  

</body>



</html>
